<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twitter Africa 🕷️</title>
  <style>
    body { font-family: Tahoma; background: #000; color: #fff; margin: 0; }
    .container { max-width: 600px; margin: auto; border: 1px solid #333; min-height: 100vh; }
    .header { padding: 15px; font-size: 20px; font-weight: bold; border-bottom: 1px solid #333; }
    .tweet-box { padding: 15px; border-bottom: 1px solid #333; }
    textarea { width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 10px; font-size: 18px; resize: none; border-radius: 10px; box-sizing: border-box; }
    .tweet-btn { background: #1d9bf0; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; float: left; margin-top: 10px; cursor: pointer; }
    .tweet { padding: 15px; border-bottom: 1px solid #333; }
    .user { font-weight: bold; }
    .handle { color: #71767b; margin-right: 5px; }
    .time { color: #71767b; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">الرئيسية</div>
    <div class="tweet-box">
      <textarea id="tweetText" placeholder="ما الذي يحدث؟" rows="3"></textarea>
      <button class="tweet-btn" onclick="postTweet()">غرد</button>
      <div style="clear:both"></div>
    </div>
    <div id="timeline"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA_xqQDkiEtmBC9_cvpRZqkGkfP-X487-M",
      authDomain: "twitter-africa-afcbe.firebaseapp.com",
      projectId: "twitter-africa-afcbe",
      storageBucket: "twitter-africa-afcbe.firebasestorage.app",
      messagingSenderId: "605897999084",
      appId: "1:605897999084:web:1aa0e77a27943f7fa6dbc9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function postTweet() {
      const text = document.getElementById('tweetText').value;
      if (!text.trim()) return;
      await addDoc(collection(db, "tweets"), {
        text: text,
        user: "ياسر",
        handle: "@yasser_africa",
        timestamp: serverTimestamp()
      });
      document.getElementById('tweetText').value = '';
    }
    window.postTweet = postTweet;

    const q = query(collection(db, "tweets"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
      const timeline = document.getElementById('timeline');
      timeline.innerHTML = '';
      snapshot.forEach((doc) => {
        const tweet = doc.data();
        const date = tweet.timestamp ? tweet.timestamp.toDate().toLocaleString('ar-EG') : 'الآن';
        timeline.innerHTML += `
          <div class="tweet">
            <div class="user">${tweet.user} <span class="handle">${tweet.handle}</span> <span class="time">· ${date}</span></div>
            <div style="margin-top: 5px;">${tweet.text}</div>
          </div>
        `;
      });
    });
  </script>
</body>
</html>
